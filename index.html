<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CAP · Protéine Maroc — CRM Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#B0122E;--crimson-deep:#5C0A18;--crimson-darker:#3E0710;--crimson-tint:#F8E9EC;
  --gold:#C8A24C;--ink:#1B1416;--muted:#8C8085;--paper:#FAF6F4;--card:#FFFFFF;--line:#ECE3E1;
  --ok:#2E7D5B;--ok-tint:#E5F1EB;--info:#3A5DA8;--info-tint:#E7ECF6;--warn:#B8862A;--warn-tint:#FBF0DA;
  --shadow:0 1px 2px rgba(27,20,22,.04),0 6px 18px rgba(92,10,24,.06);
  --shadow-lg:0 12px 40px rgba(92,10,24,.16);--r:16px;--r-sm:11px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.45}
h1,h2,h3{font-family:"Bricolage Grotesque",sans-serif;letter-spacing:-.01em;margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.hidden{display:none !important}

/* LOGIN */
.auth{min-height:100dvh;display:flex;flex-direction:column;
  background:radial-gradient(120% 80% at 85% -10%,rgba(200,162,76,.16),transparent 55%),linear-gradient(155deg,var(--crimson-deep),var(--crimson-darker));
  color:#fff;padding:calc(env(safe-area-inset-top) + 34px) 26px 30px}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:auto}
.mono{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  font-family:"Bricolage Grotesque";font-weight:800;font-size:22px;color:var(--crimson-deep);
  background:linear-gradient(160deg,#fff,#F3E7C9);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.auth-brand small{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.62);font-weight:600}
.auth-brand b{font-family:"Bricolage Grotesque";font-weight:700;font-size:16px}
.auth-hero{padding:38px 0 26px}
.auth-hero .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px}
.auth-hero h1{font-size:clamp(32px,9vw,44px);font-weight:800;line-height:1.02}
.auth-hero p{color:rgba(255,255,255,.72);font-size:15px;max-width:34ch;margin:14px 0 0}
.auth-card{background:var(--card);color:var(--ink);border-radius:22px;padding:22px 20px;box-shadow:var(--shadow-lg)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 7px 2px}
.field input,.field select,.field textarea{width:100%;padding:14px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:#fff;transition:border-color .15s}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--crimson)}
.field.half{display:inline-block;width:calc(50% - 5px)}
.field.half:first-of-type{margin-right:8px}
.btn{width:100%;padding:15px;border-radius:var(--r-sm);font-weight:700;font-size:15.5px;background:var(--crimson);color:#fff;transition:transform .06s,filter .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.985)}.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent;color:var(--crimson);border:1.5px solid var(--line)}
.btn.mini{width:auto;padding:10px 14px;font-size:13px}
.auth-err{color:#FFD5DA;font-size:13px;font-weight:600;margin:0 0 12px;min-height:0}
.demo-note{margin-top:16px;font-size:12px;color:rgba(255,255,255,.66);text-align:center;line-height:1.7}
.demo-note b{color:#fff}
.demo-chip{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);padding:3px 9px;border-radius:20px;margin:3px;font-size:11.5px;font-weight:500}

/* SHELL */
.app{max-width:760px;margin:0 auto;min-height:100dvh;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.topbar{position:sticky;top:0;z-index:20;background:rgba(250,246,244,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;display:flex;align-items:center;gap:12px}
.topbar .mono{width:38px;height:38px;font-size:19px;box-shadow:none;border:1px solid var(--line)}
.topbar .who{flex:1;min-width:0}
.topbar .who b{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .who span{font-size:11.5px;color:var(--muted)}
.role-pill{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:4px 9px;border-radius:20px;background:var(--crimson-tint);color:var(--crimson);white-space:nowrap}
.role-pill.sa{background:var(--crimson);color:#fff}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line);background:#fff}
.icon-btn:active{background:var(--crimson-tint)}

.page{padding:18px 18px 8px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-head{margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.page-head .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--crimson);font-weight:700}
.page-head h2{font-size:27px;font-weight:800;margin-top:3px}
.page-head p{color:var(--muted);font-size:13.5px;margin:4px 0 0}

/* segmented (scope toggle) */
.seg{display:inline-flex;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap}
.seg button.on{background:var(--crimson);color:#fff}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 12px}
.stat .n{font-family:"Bricolage Grotesque";font-weight:800;font-size:24px;line-height:1;color:var(--crimson)}
.stat .l{font-size:11px;color:var(--muted);margin-top:5px;font-weight:500}

.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;margin:0 -2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;background:#fff;border:1.5px solid var(--line);color:var(--muted);flex:0 0 auto;transition:all .12s}
.chip.on{background:var(--crimson);border-color:var(--crimson);color:#fff}

.searchbar{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;margin-bottom:14px}
.searchbar input{border:none;flex:1;padding:0;background:none}.searchbar input:focus{outline:none}
.searchbar svg{color:var(--muted);flex:0 0 auto}

.month-label{font-family:"Bricolage Grotesque";font-weight:700;font-size:13px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;margin:22px 0 12px;display:flex;align-items:center;gap:10px}
.month-label:first-child{margin-top:4px}
.month-label::after{content:"";flex:1;height:1px;background:var(--line)}

/* meeting card */
.mtg{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 15px 15px 16px;margin-bottom:11px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:flex-start;overflow:hidden}
.mtg::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--crimson)}
.mtg.rl::before{background:var(--gold)}
.mtg.annulee{opacity:.5}
.mtg.annulee .club{text-decoration:line-through}
.mtg.past{opacity:.66}
.mtg-date{flex:0 0 auto;text-align:center;min-width:46px}
.mtg-date .d{font-family:"Bricolage Grotesque";font-weight:800;font-size:24px;line-height:1}
.mtg-date .m{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-top:2px}
.mtg-date .wd{font-size:10px;color:var(--muted);margin-top:4px}
.mtg-body{flex:1;min-width:0}
.mtg-body .club{font-family:"Bricolage Grotesque";font-weight:700;font-size:15.5px;line-height:1.2}
.mtg-meta{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:7px;font-size:12.5px;color:var(--muted)}
.mtg-meta span{display:inline-flex;align-items:center;gap:5px}
.mtg-meta svg{opacity:.7}
.mtg-meta .tbd{color:var(--crimson);font-weight:600}
.mtg-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badges{display:flex;gap:5px;flex:0 0 auto}
.badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.badge.si{background:var(--crimson-tint);color:var(--crimson)}
.badge.rl{background:#F6EED9;color:#8A6A1C}
.st{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.st.planifiee{background:#F0ECEC;color:var(--muted)}
.st.confirmee{background:var(--ok-tint);color:var(--ok)}
.st.realisee{background:var(--info-tint);color:var(--info)}
.st.annulee{background:var(--crimson-tint);color:var(--crimson)}
.guest-count{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--crimson);font-weight:600;margin-top:8px;background:var(--crimson-tint);padding:3px 9px;border-radius:20px}

/* tiles */
.grid{display:grid;gap:11px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tile h3{font-size:16px;font-weight:700}
.tile .sub{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dot{width:4px;height:4px;border-radius:50%;background:var(--muted);display:inline-block}
.tile-foot{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:8px;background:var(--paper);color:var(--muted);border:1px solid var(--line)}
.tag.crim{background:var(--crimson-tint);color:var(--crimson);border-color:transparent}
.tag.empty{background:var(--warn-tint);color:var(--warn);border-color:transparent}
.tag.ok{background:var(--ok-tint);color:var(--ok);border-color:transparent}
.avatar{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:700;font-size:16px;color:#fff;background:linear-gradient(160deg,var(--crimson),var(--crimson-deep))}

/* lieu card */
.lieu-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:11px}
.lieu-photo{height:120px;background:linear-gradient(160deg,var(--crimson-deep),var(--crimson-darker));background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:12px}
.lieu-photo .lieu-name{color:#fff;font-family:"Bricolage Grotesque";font-weight:700;font-size:17px;text-shadow:0 1px 8px rgba(0,0,0,.5)}
.lieu-photo.noimg{align-items:center;justify-content:center}
.lieu-photo.noimg .ph{font-family:"Bricolage Grotesque";font-weight:800;font-size:34px;color:rgba(255,255,255,.5)}
.lieu-info{padding:12px 15px 14px}
.lieu-info .sub{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lieu-info .foot{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.map-embed{width:100%;height:150px;border:0;border-radius:12px;margin-top:12px;background:#eee}

/* empty */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty svg{opacity:.32;margin-bottom:12px}
.empty b{display:block;color:var(--ink);font-family:"Bricolage Grotesque";font-weight:700;font-size:16px;margin-bottom:5px}
.empty p{font-size:13.5px;margin:0}

/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);font-size:10px;font-weight:600;border-radius:12px;transition:color .15s}
.nav button.on{color:var(--crimson)}
.nav button svg{width:22px;height:22px}

.fab{position:fixed;right:18px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:31;width:56px;height:56px;border-radius:18px;background:var(--crimson);color:#fff;display:grid;place-items:center;box-shadow:0 8px 24px rgba(176,18,46,.4);transition:transform .08s}
.fab:active{transform:scale(.92)}

/* sheet */
.sheet-wrap{position:fixed;inset:0;z-index:50;display:none}
.sheet-wrap.open{display:block}
.sheet-bg{position:absolute;inset:0;background:rgba(27,20,22,.42);animation:fade .2s}
.sheet{position:absolute;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));max-height:93dvh;overflow-y:auto;animation:slideup .28s cubic-bezier(.16,1,.3,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet-grip{width:40px;height:4px;border-radius:4px;background:var(--line);margin:8px auto 16px}
.sheet h3{font-size:20px;font-weight:800;margin-bottom:4px}
.sheet .sheet-sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.sheet-actions{display:flex;gap:10px;margin-top:10px}
.sheet-actions .btn{flex:1}
.del-link{text-align:center;color:var(--crimson);font-weight:600;font-size:13.5px;padding:14px;margin-top:2px}
.divider{height:1px;background:var(--line);margin:18px -20px}

/* detail rows */
.drow{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}
.drow .ic{width:34px;height:34px;border-radius:9px;background:var(--crimson-tint);color:var(--crimson);display:grid;place-items:center;flex:0 0 auto}
.drow .tx{flex:1;min-width:0}
.drow .tx .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.drow .tx .v{font-size:14.5px;font-weight:500;margin-top:1px}
.drow a{color:var(--crimson);font-weight:600;text-decoration:none;font-size:13px}

/* guests */
.guest{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.guest:last-child{border-bottom:none}
.guest .gav{width:34px;height:34px;border-radius:50%;background:var(--paper);border:1px solid var(--line);display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--muted);flex:0 0 auto}
.guest .gi{flex:1;min-width:0}
.guest .gi b{font-size:14px;font-weight:600;display:block}
.guest .gi small{font-size:11.5px;color:var(--muted)}
.gstat{border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:600;background:#fff;flex:0 0 auto}
.photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:1.5px dashed var(--line);border-radius:var(--r-sm);color:var(--muted);font-weight:600;font-size:13.5px;margin-bottom:14px}
.photo-prev{width:100%;height:150px;object-fit:cover;border-radius:var(--r-sm);margin-bottom:12px}

.toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:60;opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow-lg);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:560px){.grid.two{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="auth" class="auth">
  <div class="auth-brand"><div class="mono">P</div><div><small>Club d'Affaires</small><b>Protéine Maroc</b></div></div>
  <div class="auth-hero">
    <div class="eyebrow">CRM Animation · Saison 2026</div>
    <h1>Le réseau,<br>piloté au&nbsp;cordeau.</h1>
    <p>Planning, clubs, lieux et invités des régions du Maroc, réunis dans un seul espace.</p>
  </div>
  <div class="auth-card">
    <div class="field"><label>Identifiant</label><input id="lg-user" type="text" autocomplete="username" placeholder="prénom" autocapitalize="none" /></div>
    <div class="field"><label>Mot de passe</label><input id="lg-pass" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
    <p id="lg-err" class="auth-err"></p>
    <button class="btn" onclick="doLogin()">Se connecter</button>
  </div>
  <div class="demo-note"><b>Comptes de démonstration</b> — mot de passe <b>cap2026</b><br>
    <span class="demo-chip">jb · super admin</span><span class="demo-chip">zoubida · Rabat</span><span class="demo-chip">anas · Casa</span><span class="demo-chip">leyla · Marrakech</span>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <div class="topbar">
    <div class="mono">P</div>
    <div class="who"><b id="tb-name">—</b><span id="tb-region">—</span></div>
    <span id="tb-role" class="role-pill">—</span>
    <button class="icon-btn" onclick="logout()" aria-label="Déconnexion"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
  <div id="view"></div>
</div>

<nav id="nav" class="nav hidden">
  <button data-tab="agenda" class="on" onclick="go('agenda')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Agenda</button>
  <button data-tab="clubs" onclick="go('clubs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/></svg>Clubs</button>
  <button data-tab="lieux" onclick="go('lieux')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Lieux</button>
  <button data-tab="team" onclick="go('team')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Équipe</button>
</nav>

<button id="fab" class="fab hidden" onclick="fabAction()" aria-label="Ajouter"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<div id="sheet" class="sheet-wrap"><div class="sheet-bg" onclick="closeSheet()"></div><div class="sheet"><div class="sheet-grip"></div><div id="sheet-content"></div></div></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   DONNÉES INITIALES — injectées depuis le planning CAP MA 2026
   (géoloc = valeurs de départ éditables, à affiner sur le terrain)
   ============================================================ */
const ROLES={superadmin:"Super admin",directeur:"Directeur de zone",animateur:"Animateur"};

/* ============================================================
   STORE
   ============================================================ */
const KEY="cap-crm-db-v2",SKEY="cap-crm-session-v2";
let DB=null,SESSION=null,tab="agenda",filter="all";
async function sget(k){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null}catch(e){return null}}
async function sset(k,v){try{await window.storage.set(k,JSON.stringify(v))}catch(e){}}
async function loadDB(){DB=await sget(KEY);if(!DB){DB=structuredClone(SEED);await sset(KEY,DB)}}
async function saveDB(){await sset(KEY,DB)}

/* ============================================================
   HELPERS
   ============================================================ */
const MOIS=["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const MOIS_LONG=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const JOURS=["dim.","lun.","mar.","mer.","jeu.","ven.","sam."];
const TODAY=new Date();TODAY.setHours(0,0,0,0);
function club(id){return DB.clubs.find(c=>c.id===id)||{}}
function anim(id){return DB.animateurs.find(a=>a.id===id)}
function animNom(id){const a=anim(id);return a?a.nom:"Non attribué"}
function lieu(id){return DB.lieux.find(l=>l.id===id)}
function lieuNom(id){const l=lieu(id);return l?l.nom:"À définir"}
function zone(id){return DB.zones.find(z=>z.id===id)}
function initiales(n){return(n||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()}
function dObj(iso){const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d)}
function isPast(iso){return dObj(iso)<TODAY}
function esc(s){return(s||"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1900)}

/* ---- périmètre selon rôle ---- */
function national(){return SESSION.role==="superadmin"&&SESSION._nat}
function scopedClubIds(){
  if(national())return DB.clubs.map(c=>c.id);
  if(SESSION.role==="superadmin"||SESSION.role==="directeur"){
    const z=zone(SESSION.zoneId);return DB.clubs.filter(c=>z.villes.includes(c.ville)).map(c=>c.id);
  }
  return SESSION.clubIds||[];
}
function scopedVilles(){
  if(national())return null; // toutes
  if(SESSION.role==="animateur")return[...new Set(SESSION.clubIds.map(id=>club(id).ville))];
  return zone(SESSION.zoneId).villes;
}
function canEditReunion(m){
  if(SESSION.role==="superadmin")return true;
  if(SESSION.role==="directeur")return zone(SESSION.zoneId).villes.includes(club(m.clubId).ville);
  return SESSION.clubIds.includes(m.clubId);
}
function canManageStructure(){return SESSION.role!=="animateur"} // clubs & animateurs
function canDeleteLieu(){return SESSION.role!=="animateur"}

/* ============================================================
   AUTH
   ============================================================ */
async function doLogin(){
  const u=document.getElementById("lg-user").value.trim().toLowerCase();
  const p=document.getElementById("lg-pass").value;const err=document.getElementById("lg-err");
  const user=DB.users.find(x=>x.login===u);
  if(!user||user.pass!==p){err.textContent="Identifiant ou mot de passe incorrect.";return}
  err.textContent="";
  SESSION={...user,_nat:false};delete SESSION.pass;
  await sset(SKEY,SESSION);document.getElementById("lg-pass").value="";enterApp();
}
async function logout(){SESSION=null;await sset(SKEY,null);
  document.getElementById("app").classList.add("hidden");document.getElementById("nav").classList.add("hidden");
  document.getElementById("fab").classList.add("hidden");document.getElementById("auth").classList.remove("hidden");window.scrollTo(0,0);}
function enterApp(){
  document.getElementById("auth").classList.add("hidden");document.getElementById("app").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");
  document.getElementById("tb-name").textContent=SESSION.name;
  const rp=document.getElementById("tb-role");rp.textContent=ROLES[SESSION.role];rp.className="role-pill"+(SESSION.role==="superadmin"?" sa":"");
  updateRegionLabel();go("agenda");
}
function updateRegionLabel(){
  let t;
  if(SESSION.role==="animateur")t="Animateur · "+[...new Set(SESSION.clubIds.map(id=>club(id).ville))].join(", ");
  else t=national()?"Vue nationale · tout le réseau":"Zone "+zone(SESSION.zoneId).nom;
  document.getElementById("tb-region").textContent=t;
}

/* ============================================================
   NAV
   ============================================================ */
function go(t){tab=t;filter="all";
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
  document.getElementById("fab").classList.toggle("hidden",tab==="team"&&!canManageStructure());
  render();window.scrollTo({top:0,behavior:"instant"});}
function render(){const v=document.getElementById("view");
  v.innerHTML=tab==="agenda"?viewAgenda():tab==="clubs"?viewClubs():tab==="lieux"?viewLieux():viewTeam();}
function fabAction(){
  if(tab==="agenda")openMeeting();
  else if(tab==="lieux")openLieu();
  else if(tab==="clubs"&&canManageStructure())clubForm(null);
  else if(tab==="team"&&canManageStructure())openAnim();
  else openMeeting();
}

/* ============================================================
   AGENDA
   ============================================================ */
function visibleReunions(){
  const ids=scopedClubIds();
  return DB.reunions.filter(m=>ids.includes(m.clubId)).sort((a,b)=>a.date.localeCompare(b.date)||(a.heure||"").localeCompare(b.heure||""));
}
function viewAgenda(){
  const all=visibleReunions();
  const upcoming=all.filter(m=>!isPast(m.date)&&m.statut!=="annulee");
  const villesActives=new Set(all.map(m=>club(m.clubId).ville));
  const tbd=all.filter(m=>!m.lieuId&&!isPast(m.date)).length;

  let list=all;
  if(filter==="up")list=all.filter(m=>!isPast(m.date));
  else if(["SI","RL"].includes(filter))list=all.filter(m=>m.type===filter);
  else if(filter.startsWith("v:"))list=all.filter(m=>club(m.clubId).ville===filter.slice(2));
  const q=(window._q||"").toLowerCase();
  if(q)list=list.filter(m=>(club(m.clubId).nom+" "+lieuNom(m.lieuId)+" "+animNom(m.animId)).toLowerCase().includes(q));

  const villeChips=[...new Set(all.map(m=>club(m.clubId).ville))].sort().map(vl=>chip(vl,"v:"+vl)).join("");
  const scopeToggle=SESSION.role==="superadmin"?`
    <div class="seg"><button class="${!SESSION._nat?"on":""}" onclick="setScope(false)">Ma zone</button><button class="${SESSION._nat?"on":""}" onclick="setScope(true)">Tout le réseau</button></div>`:"";

  let cards="";
  if(!list.length)cards=emptyState("Aucune réunion","Ajuste les filtres ou planifie une nouvelle date avec le bouton +.");
  else{let cm="";list.forEach(m=>{const dt=dObj(m.date),mk=dt.getFullYear()+"-"+dt.getMonth();
    if(mk!==cm){cm=mk;cards+=`<div class="month-label">${MOIS_LONG[dt.getMonth()]} ${dt.getFullYear()}</div>`}cards+=meetingCard(m);});}

  return `<div class="page">
    <div class="page-head"><div><div class="eyebrow">${national()?"Toutes les régions":SESSION.role==="animateur"?"Mes clubs":"Zone "+zone(SESSION.zoneId).nom}</div><h2>Agenda</h2></div>
      ${SESSION.role!=="animateur"?`<button class="btn ghost mini" onclick="exportCSV()">Export</button>`:""}</div>
    ${scopeToggle?`<div style="margin-bottom:14px">${scopeToggle}</div>`:""}
    <div class="stats">
      <div class="stat"><div class="n">${upcoming.length}</div><div class="l">À venir</div></div>
      <div class="stat"><div class="n">${villesActives.size}</div><div class="l">Villes actives</div></div>
      <div class="stat"><div class="n">${tbd}</div><div class="l">Lieux à définir</div></div>
    </div>
    <div class="searchbar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Rechercher club, lieu, animateur…" value="${esc(window._q||"")}" oninput="window._q=this.value;render()"></div>
    <div class="filters">${chip("Toutes","all")}${chip("À venir","up")}${chip("SI","SI")}${chip("RL","RL")}${villeChips}</div>
    ${cards}<div style="height:8px"></div></div>`;
}
function setScope(nat){SESSION._nat=nat;sset(SKEY,SESSION);updateRegionLabel();render();}
function chip(l,v){return `<button class="chip ${filter===v?"on":""}" onclick="filter='${v}';render()">${esc(l)}</button>`}

function meetingCard(m){
  const c=club(m.clubId),dt=dObj(m.date),past=isPast(m.date),tbd=!m.lieuId,ng=(m.guests||[]).length;
  return `<div class="mtg ${m.type==="RL"?"rl":""} ${past?"past":""} ${m.statut==="annulee"?"annulee":""}" onclick="openMeeting('${m.id}')">
    <div class="mtg-date"><div class="d">${dt.getDate()}</div><div class="m">${MOIS[dt.getMonth()]}</div><div class="wd">${JOURS[dt.getDay()]}${m.heure?" · "+m.heure:""}</div></div>
    <div class="mtg-body">
      <div class="mtg-top"><div class="club">${esc(c.nom||"—")}</div><div class="badges"><span class="badge ${m.type==="SI"?"si":"rl"}">${m.type}</span></div></div>
      <div class="mtg-meta">
        <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(c.ville||"")}</span>
        <span class="${tbd?"tbd":""}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14"/></svg>${esc(lieuNom(m.lieuId))}</span>
        <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>${esc(animNom(m.animId))}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:9px">
        <span class="st ${m.statut}">${STATUTS[m.statut]}</span>
        ${ng?`<span class="guest-count"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${ng} invité${ng>1?"s":""}</span>`:""}
      </div>
    </div></div>`;
}

/* ============================================================
   CLUBS
   ============================================================ */
function viewClubs(){
  const ids=scopedClubIds();
  let clubs=DB.clubs.filter(c=>ids.includes(c.id));
  clubs.sort((a,b)=>a.ville.localeCompare(b.ville)||a.nom.localeCompare(b.nom));
  const q=(window._q2||"").toLowerCase();if(q)clubs=clubs.filter(c=>(c.nom+" "+c.ville).toLowerCase().includes(q));
  const sansAnim=clubs.filter(c=>!c.animId).length;
  const tiles=clubs.map(c=>{
    const nbUp=DB.reunions.filter(m=>m.clubId===c.id&&!isPast(m.date)&&m.statut!=="annulee").length;
    const nbR=DB.reunions.filter(m=>m.clubId===c.id).length;const a=anim(c.animId);
    return `<div class="tile" onclick="openClub('${c.id}')">
      <div class="tile-top"><div><h3>${esc(c.nom)}</h3>
        <div class="sub"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(c.ville)} <span class="dot"></span> ${c.statut==="actif"?"Actif":"En création"}</div></div></div>
      <div class="tile-foot">${a?`<span class="tag crim">${esc(a.nom)}</span>`:`<span class="tag empty">Animateur à pourvoir</span>`}<span class="tag">${nbUp} à venir · ${nbR} total</span></div></div>`;
  }).join("");
  return `<div class="page"><div class="page-head"><div><div class="eyebrow">Réseau</div><h2>Clubs d'affaires</h2><p>${clubs.length} clubs${sansAnim?` · ${sansAnim} sans animateur`:""}</p></div></div>
    <div class="searchbar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Rechercher un club…" value="${esc(window._q2||"")}" oninput="window._q2=this.value;render()"></div>
    <div class="grid two">${tiles||emptyState("Aucun club","")}</div><div style="height:8px"></div></div>`;
}

function viewLieux(){
  let lieux=[...DB.lieux];const v=scopedVilles();
  if(v)lieux=lieux.filter(l=>v.includes(l.ville));
  lieux.sort((a,b)=>a.ville.localeCompare(b.ville)||a.nom.localeCompare(b.nom));
  const q=(window._q3||"").toLowerCase();if(q)lieux=lieux.filter(l=>(l.nom+" "+l.ville+" "+l.adresse).toLowerCase().includes(q));
  const cards=lieux.map(l=>{
    const nbR=DB.reunions.filter(m=>m.lieuId===l.id&&!isPast(m.date)).length;
    return `<div class="lieu-card" onclick="openLieu('${l.id}')">
      <div class="lieu-photo ${l.photo?"":"noimg"}" style="${l.photo?`background-image:url('${l.photo}')`:""}">

        ${l.photo?"":`<h3 style="font-size:16px;margin-bottom:4px">${esc(l.nom)}</h3>`}
        <div class="sub"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(l.ville)}${l.capacite?` <span class="dot"></span> ${l.capacite} pers.`:""}</div>
        <div class="foot"><span class="tag ${nbR?"crim":""}">${nbR} réunion${nbR>1?"s":""} à venir</span>${l.lat?`<span class="tag ok">📍 Géolocalisé</span>`:`<span class="tag empty">Géoloc manquante</span>`}</div>
      </div></div>`;
  }).join("");
  return `<div class="page"><div class="page-head"><div><div class="eyebrow">Terrain</div><h2>Lieux de réunion</h2><p>${lieux.length} lieu${lieux.length>1?"x":""} référencé${lieux.length>1?"s":""}</p></div></div>

    ${cards||emptyState("Aucun lieu","Ajoute ton premier lieu avec le bouton +.")}<div style="height:8px"></div></div>`;
}

function viewTeam(){
  let anims=[...DB.animateurs];const v=scopedVilles();
  if(v)anims=anims.filter(a=>v.includes(a.ville));
  anims.sort((a,b)=>a.ville.localeCompare(b.ville)||a.nom.localeCompare(b.nom));
  const tiles=anims.map(a=>{
    const clubs=DB.clubs.filter(c=>c.animId===a.id);
    const nbUp=DB.reunions.filter(m=>m.animId===a.id&&!isPast(m.date)&&m.statut!=="annulee").length;
    return `<div class="tile" onclick="openAnim('${a.id}')">

function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const img=new Image();const rd=new FileReader();
  rd.onload=()=>{img.onload=()=>{
    const max=1000;let{width:w,height:h}=img;if(w>max||h>max){if(w>h){h=h*max/w;w=max}else{w=w*max/h;h=max}}
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
    _photoBuffer=cv.toDataURL("image/jpeg",0.72);
    const p=document.getElementById("l-photo-prev");p.src=_photoBuffer;p.classList.remove("hidden");
  };img.src=rd.result;};rd.readAsDataURL(file);
}

    capacite:parseInt(g("l-cap"))||"",contactNom:g("l-cnom").trim(),contactTel:g("l-ctel").trim(),notes:g("l-notes").trim(),
    photo:_photoBuffer!==null?_photoBuffer:(existing?existing.photo:"")};
  if(id){Object.assign(existing,data);toast("Lieu mis à jour")}else{DB.lieux.push({id:"l"+Date.now(),...data});toast("Lieu créé")}
  _photoBuffer=null;await saveDB();closeSheet();render();

async function saveAnim(id){
  const g=x=>document.getElementById(x).value;const nom=g("an-nom").trim();if(!nom){toast("Nom requis");return}
  const data={nom,ville:g("an-ville"),tel:g("an-tel").trim(),email:g("an-email").trim()};
  if(id)Object.assign(anim(id),data);else DB.animateurs.push({id:"a"+Date.now(),...data});
  await saveDB();closeSheet();render();toast(id?"Animateur mis à jour":"Animateur créé");
}
async function delAnim(id){
  DB.clubs.forEach(c=>{if(c.animId===id)c.animId=null});
  DB.animateurs=DB.animateurs.filter(a=>a.id!==id);await saveDB();closeSheet();render();toast("Animateur retiré");
}

/* ============================================================
   EXPORT CSV
   ============================================================ */
function exportCSV(){
  const rows=[["Type","Club","Ville","Date","Heure","Lieu","Animateur","Statut","Invités"]];
  visibleReunions().forEach(m=>{const c=club(m.clubId);
    rows.push([TYPES[m.type],c.nom,c.ville,m.date,m.heure||"",lieuNom(m.lieuId),animNom(m.animId),STATUTS[m.statut],(m.guests||[]).length]);});
  const csv="﻿"+rows.map(r=>r.map(x=>`"${(x+"").replace(/"/g,'""')}"`).join(";")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="agenda-cap-"+new Date().toISOString().slice(0,10)+".csv";a.click();toast("Agenda exporté");
}
