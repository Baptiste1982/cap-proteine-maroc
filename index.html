<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CAP · Protéine Maroc — CRM Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#B0122E;--crimson-deep:#5C0A18;--crimson-darker:#3E0710;--crimson-tint:#F8E9EC;
  --gold:#C8A24C;--ink:#1B1416;--muted:#8C8085;--paper:#FAF6F4;--card:#FFFFFF;--line:#ECE3E1;
  --ok:#2E7D5B;--ok-tint:#E5F1EB;--info:#3A5DA8;--info-tint:#E7ECF6;--warn:#B8862A;--warn-tint:#FBF0DA;
  --shadow:0 1px 2px rgba(27,20,22,.04),0 6px 18px rgba(92,10,24,.06);
  --shadow-lg:0 12px 40px rgba(92,10,24,.16);--r:16px;--r-sm:11px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.45}
h1,h2,h3{font-family:"Bricolage Grotesque",sans-serif;letter-spacing:-.01em;margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.hidden{display:none !important}

/* LOGIN */
.auth{min-height:100dvh;display:flex;flex-direction:column;
  background:radial-gradient(120% 80% at 85% -10%,rgba(200,162,76,.16),transparent 55%),linear-gradient(155deg,var(--crimson-deep),var(--crimson-darker));
  color:#fff;padding:calc(env(safe-area-inset-top) + 34px) 26px 30px}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:auto}
.mono{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  font-family:"Bricolage Grotesque";font-weight:800;font-size:22px;color:var(--crimson-deep);
  background:linear-gradient(160deg,#fff,#F3E7C9);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.auth-brand small{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.62);font-weight:600}
.auth-brand b{font-family:"Bricolage Grotesque";font-weight:700;font-size:16px}
.auth-hero{padding:38px 0 26px}
.auth-hero .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px}
.auth-hero h1{font-size:clamp(32px,9vw,44px);font-weight:800;line-height:1.02}
.auth-hero p{color:rgba(255,255,255,.72);font-size:15px;max-width:34ch;margin:14px 0 0}
.auth-card{background:var(--card);color:var(--ink);border-radius:22px;padding:22px 20px;box-shadow:var(--shadow-lg)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 7px 2px}
.field input,.field select,.field textarea{width:100%;padding:14px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:#fff;transition:border-color .15s}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--crimson)}
.field.half{display:inline-block;width:calc(50% - 5px)}
.field.half:first-of-type{margin-right:8px}
.btn{width:100%;padding:15px;border-radius:var(--r-sm);font-weight:700;font-size:15.5px;background:var(--crimson);color:#fff;transition:transform .06s,filter .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.985)}.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent;color:var(--crimson);border:1.5px solid var(--line)}
.btn.mini{width:auto;padding:10px 14px;font-size:13px}
.auth-err{color:#FFD5DA;font-size:13px;font-weight:600;margin:0 0 12px;min-height:0}
.demo-note{margin-top:16px;font-size:12px;color:rgba(255,255,255,.66);text-align:center;line-height:1.7}
.demo-note b{color:#fff}
.demo-chip{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);padding:3px 9px;border-radius:20px;margin:3px;font-size:11.5px;font-weight:500}

/* SHELL */
.app{max-width:760px;margin:0 auto;min-height:100dvh;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.topbar{position:sticky;top:0;z-index:20;background:rgba(250,246,244,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;display:flex;flex-direction:column;gap:9px}
.tb-row{display:flex;align-items:center;gap:11px}
.tb-row2{gap:8px}
.tb-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar .mono{width:38px;height:38px;font-size:19px;box-shadow:none;border:1px solid var(--line)}
.topbar .who{flex:1;min-width:0}
.topbar .who b{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .who span{font-size:11.5px;color:var(--muted)}
.role-pill{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:4px 9px;border-radius:20px;background:var(--crimson-tint);color:var(--crimson);white-space:nowrap}
.role-pill.sa{background:var(--crimson);color:#fff}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line);background:#fff}
.icon-btn:active{background:var(--crimson-tint)}

.page{padding:18px 18px 8px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-head{margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.page-head .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--crimson);font-weight:700}
.page-head h2{font-size:27px;font-weight:800;margin-top:3px}
.page-head p{color:var(--muted);font-size:13.5px;margin:4px 0 0}

/* segmented (scope toggle) */
.seg{display:inline-flex;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap}
.seg button.on{background:var(--crimson);color:#fff}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 12px}
.stat .n{font-family:"Bricolage Grotesque";font-weight:800;font-size:24px;line-height:1;color:var(--crimson)}
.stat .l{font-size:11px;color:var(--muted);margin-top:5px;font-weight:500}
.stat.link{cursor:pointer;transition:border-color .12s,transform .06s}
.stat.link:active{transform:scale(.97)}
.stat.on{border-color:var(--crimson);box-shadow:inset 0 0 0 1px var(--crimson)}

.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;margin:0 -2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;background:#fff;border:1.5px solid var(--line);color:var(--muted);flex:0 0 auto;transition:all .12s}
.chip.on{background:var(--crimson);border-color:var(--crimson);color:#fff}

.searchbar{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;margin-bottom:14px}
.searchbar input{border:none;flex:1;padding:0;background:none}.searchbar input:focus{outline:none}
.searchbar svg{color:var(--muted);flex:0 0 auto}

.month-label{font-family:"Bricolage Grotesque";font-weight:700;font-size:13px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;margin:22px 0 12px;display:flex;align-items:center;gap:10px}
.month-label:first-child{margin-top:4px}
.month-label::after{content:"";flex:1;height:1px;background:var(--line)}

/* meeting card */
.mtg{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 15px 15px 16px;margin-bottom:11px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:flex-start;overflow:hidden}
.mtg::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--crimson)}
.mtg.rl::before{background:var(--gold)}
.mtg.annulee{opacity:.5}
.mtg.annulee .club{text-decoration:line-through}
.mtg.past{opacity:.66}
.mtg-date{flex:0 0 auto;text-align:center;min-width:46px}
.mtg-date .d{font-family:"Bricolage Grotesque";font-weight:800;font-size:24px;line-height:1}
.mtg-date .m{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-top:2px}
.mtg-date .wd{font-size:10px;color:var(--muted);margin-top:4px}
.mtg-body{flex:1;min-width:0}
.mtg-body .club{font-family:"Bricolage Grotesque";font-weight:700;font-size:15.5px;line-height:1.2}
.mtg-meta{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:7px;font-size:12.5px;color:var(--muted)}
.mtg-meta span{display:inline-flex;align-items:center;gap:5px}
.mtg-meta svg{opacity:.7}
.mtg-meta .tbd{color:var(--crimson);font-weight:600}
.mtg-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badges{display:flex;gap:5px;flex:0 0 auto}
.badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.badge.si{background:var(--crimson-tint);color:var(--crimson)}
.badge.rl{background:#F6EED9;color:#8A6A1C}
.st{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.st.planifiee{background:#F0ECEC;color:var(--muted)}
.st.confirmee{background:var(--ok-tint);color:var(--ok)}
.st.realisee{background:var(--info-tint);color:var(--info)}
.st.annulee{background:var(--crimson-tint);color:var(--crimson)}
.guest-count{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--crimson);font-weight:600;margin-top:8px;background:var(--crimson-tint);padding:3px 9px;border-radius:20px}

/* tiles */
.grid{display:grid;gap:11px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tile h3{font-size:16px;font-weight:700}
.tile .sub{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dot{width:4px;height:4px;border-radius:50%;background:var(--muted);display:inline-block}
.hdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle;flex:0 0 auto}
.hpct{font-family:"Bricolage Grotesque";font-weight:800;font-size:13px;flex:0 0 auto}
.hdot.ok,.hpct.ok{color:var(--ok)}.hdot.ok{background:var(--ok)}
.hdot.warn,.hpct.warn{color:var(--warn)}.hdot.warn{background:var(--warn)}
.hdot.bad,.hpct.bad{color:var(--crimson)}.hdot.bad{background:var(--crimson)}
.health-banner{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);margin-bottom:14px}
.health-banner .hbig{font-family:"Bricolage Grotesque";font-weight:800;font-size:22px;flex:0 0 auto}
.health-banner .hna{flex:1;min-width:0;font-size:13px}
.health-banner .hna b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;opacity:.75}
.health-banner.ok{background:var(--ok-tint)}.health-banner.ok .hbig,.health-banner.ok b{color:var(--ok)}
.health-banner.warn{background:var(--warn-tint)}.health-banner.warn .hbig,.health-banner.warn b{color:var(--warn)}
.health-banner.bad{background:var(--crimson-tint)}.health-banner.bad .hbig,.health-banner.bad b{color:var(--crimson)}
.tile-foot{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:8px;background:var(--paper);color:var(--muted);border:1px solid var(--line)}
.tag.crim{background:var(--crimson-tint);color:var(--crimson);border-color:transparent}
.tag.empty{background:var(--warn-tint);color:var(--warn);border-color:transparent}
.tag.ok{background:var(--ok-tint);color:var(--ok);border-color:transparent}
.avatar{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:700;font-size:16px;color:#fff;background:linear-gradient(160deg,var(--crimson),var(--crimson-deep))}

/* lieu card */
.lieu-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;transition:transform .1s,box-shadow .15s}
.lieu-card:active{transform:scale(.99)}
.lieu-photo{position:relative;height:132px;background:linear-gradient(150deg,var(--crimson),var(--crimson-deep) 60%,var(--crimson-darker));background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:13px}
.lieu-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(27,20,22,.62),rgba(27,20,22,.05) 55%,transparent)}
.lieu-photo .lieu-name{position:relative;z-index:1;color:#fff;font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;line-height:1.15;text-shadow:0 1px 10px rgba(0,0,0,.55)}
.lieu-photo .cap-badge{position:absolute;top:11px;right:11px;z-index:1;background:rgba(255,255,255,.92);color:var(--crimson);font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.lieu-photo .pin-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);color:rgba(255,255,255,.28);z-index:0}
.lieu-map{position:absolute;inset:0;width:100%;height:100%;border:0;pointer-events:none;z-index:0}
.lieu-info{padding:12px 15px 14px}
.lieu-info .sub{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lieu-info .foot{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;align-items:center}
.map-embed{width:100%;height:150px;border:0;border-radius:12px;margin-top:12px;background:#eee}

/* empty */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty svg{opacity:.32;margin-bottom:12px}
.empty b{display:block;color:var(--ink);font-family:"Bricolage Grotesque";font-weight:700;font-size:16px;margin-bottom:5px}
.empty p{font-size:13.5px;margin:0}

/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);display:flex;padding:6px 6px calc(6px + min(env(safe-area-inset-bottom), 8px));max-width:760px;margin:0 auto;transform:translateZ(0);-webkit-transform:translateZ(0);will-change:transform;box-shadow:0 -2px 12px rgba(27,20,22,.05)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);font-size:10px;font-weight:600;border-radius:12px;transition:color .15s}
.nav button.on{color:var(--crimson)}
.nav button svg{width:22px;height:22px}

.fab{position:fixed;right:18px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:31;width:56px;height:56px;border-radius:18px;background:var(--crimson);color:#fff;display:grid;place-items:center;box-shadow:0 8px 24px rgba(176,18,46,.4);transition:transform .08s}
.fab:active{transform:scale(.92)}

/* sheet */
.sheet-wrap{position:fixed;inset:0;z-index:50;display:none}
.sheet-wrap.open{display:block}
.sheet-bg{position:absolute;inset:0;background:rgba(27,20,22,.42);animation:fade .2s}
.sheet{position:absolute;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));max-height:93dvh;overflow-y:auto;animation:slideup .28s cubic-bezier(.16,1,.3,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet-grip{width:40px;height:4px;border-radius:4px;background:var(--line);margin:8px auto 16px}
.sheet h3{font-size:20px;font-weight:800;margin-bottom:4px}
.sheet .sheet-sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.sheet-actions{display:flex;gap:10px;margin-top:10px}
.sheet-actions .btn{flex:1}
.del-link{text-align:center;color:var(--crimson);font-weight:600;font-size:13.5px;padding:14px;margin-top:2px}
.divider{height:1px;background:var(--line);margin:18px -20px}

/* detail rows */
.drow{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}
.drow .ic{width:34px;height:34px;border-radius:9px;background:var(--crimson-tint);color:var(--crimson);display:grid;place-items:center;flex:0 0 auto}
.drow .tx{flex:1;min-width:0}
.drow .tx .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.drow .tx .v{font-size:14.5px;font-weight:500;margin-top:1px}
.drow a{color:var(--crimson);font-weight:600;text-decoration:none;font-size:13px}

/* guests */
.guest{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.guest:last-child{border-bottom:none}
.guest .gav{width:34px;height:34px;border-radius:50%;background:var(--paper);border:1px solid var(--line);display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--muted);flex:0 0 auto}
.guest .gi{flex:1;min-width:0}
.guest .gi b{font-size:14px;font-weight:600;display:block}
.guest .gi small{font-size:11.5px;color:var(--muted)}
.gstat{border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:600;background:#fff;flex:0 0 auto}
.photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:1.5px dashed var(--line);border-radius:var(--r-sm);color:var(--muted);font-weight:600;font-size:13.5px;margin-bottom:14px}
.photo-prev{width:100%;height:150px;object-fit:cover;border-radius:var(--r-sm);margin-bottom:12px}

.toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:60;opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow-lg);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:560px){.grid.two{grid-template-columns:1fr 1fr}}

/* version + maj */
.verpill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--paper);border:1px solid var(--line);color:var(--muted);cursor:pointer;white-space:nowrap;flex:0 0 auto}
.update-bar{position:fixed;right:12px;left:auto;bottom:calc(92px + env(safe-area-inset-bottom));width:auto;max-width:min(340px,calc(100vw - 24px));z-index:40;background:var(--crimson);color:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:slideup .3s cubic-bezier(.16,1,.3,1)}
.update-bar .ub-t{font-size:13.5px;font-weight:600;flex:1;line-height:1.3}
.update-bar button{background:#fff;color:var(--crimson);font-weight:700;font-size:13px;padding:9px 14px;border-radius:10px;flex:0 0 auto}
/* changelog */
.cl-ver{margin:18px 0 10px;display:flex;align-items:baseline;gap:10px}
.cl-ver b{font-family:"Bricolage Grotesque";font-weight:800;font-size:17px}
.cl-ver span{font-size:12px;color:var(--muted)}
.cl-grp{margin:0 0 12px}
.cl-grp .h{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.cl-grp.add .h{color:var(--ok)}.cl-grp.mod .h{color:var(--info)}.cl-grp.fix .h{color:var(--warn)}
.cl-grp ul{margin:0;padding-left:18px}
.cl-grp li{font-size:13.5px;margin-bottom:4px;line-height:1.4}
/* dashboard */
.dash-band{font-family:"Bricolage Grotesque";font-weight:800;font-size:13px;letter-spacing:.02em;text-transform:uppercase;color:var(--crimson);margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.dash-band:first-child{margin-top:2px}
.dash-band::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,var(--crimson-tint),transparent)}
.dash-band.reg{color:var(--gold)}.dash-band.reg::after{background:linear-gradient(90deg,#F6EED9,transparent)}
.rank{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-top:2px}
.rank-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line)}
.rank-row:last-child{border-bottom:none}
.rank-row .rn{flex:1;min-width:0;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-row .rn small{display:block;font-size:11.5px;color:var(--muted);font-weight:500}
.rank-row .rv{font-family:"Bricolage Grotesque";font-weight:800;font-size:16px;color:var(--crimson);flex:0 0 auto}
.bar{height:6px;border-radius:6px;background:var(--crimson-tint);overflow:hidden;flex:0 0 90px;max-width:90px}
.bar i{display:block;height:100%;background:var(--crimson)}

/* ===== DESKTOP / PC (≥ 900px) : barre latérale + contenu large + fiches en panneau droit ===== */
@media(min-width:900px){
  .nav{top:0;bottom:0;left:0;right:auto;width:216px;max-width:none;height:100dvh;margin:0;
    flex-direction:column;justify-content:flex-start;align-items:stretch;gap:5px;
    padding:22px 12px;border-top:none;border-right:1px solid var(--line);box-shadow:none}
  .nav::before{content:"CAP · Protéine Maroc";display:block;font-family:"Bricolage Grotesque";font-weight:800;font-size:15px;color:var(--crimson);padding:6px 14px 16px}
  .nav button{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:13px;padding:11px 14px;border-radius:11px;font-size:14px;font-weight:600;color:var(--ink)}
  .nav button svg{width:20px;height:20px;color:var(--muted)}
  .nav button.on{background:var(--crimson-tint);color:var(--crimson)}
  .nav button.on svg{color:var(--crimson)}
  .app{margin:0 auto 0 216px;max-width:1180px;min-height:100dvh;padding-bottom:24px}
  .topbar{flex-direction:row;align-items:center;gap:16px;padding:14px 26px}
  .tb-row2{margin-left:auto}
  .fab{right:34px;bottom:34px;left:auto}
  .page{padding:22px 26px 10px}
  .grid.two{grid-template-columns:repeat(3,1fr)}
  .stats{grid-template-columns:repeat(3,1fr)}
  /* fiches = panneau latéral droit */
  .sheet{top:0;bottom:0;right:0;left:auto;margin:0;width:460px;max-width:90vw;height:100dvh;max-height:none;border-radius:0;padding:22px 24px calc(24px + env(safe-area-inset-bottom));animation:slidein .28s cubic-bezier(.16,1,.3,1)}

  .auth-brand{margin-bottom:22px}
  .auth-hero{padding:22px 0}
}
@keyframes slidein{from{transform:translateX(100%)}to{transform:none}}

/* ============================================================
   STORE — Supabase (base + auth + RLS)
   ============================================================ */
const SB_URL="https://xsppsqjigdgaybmowzaq.supabase.co";
const SB_KEY="sb_publishable_2uW0CfYvPRJ8TsJw_aNNhA_l7_UQjL7";
const EMAIL_DOMAIN="cap-proteine.ma";
const sb=window.supabase.createClient(SB_URL,SB_KEY);
let DB=null,SESSION=null,tab="agenda",filter="all";

/* ---- mappers : lignes Supabase (snake) <-> objets front (camel) ---- */
function mapZone(r){return{id:r.id,nom:r.nom,villes:r.villes||[]}}
function mapAnim(r){return{id:r.id,nom:r.nom,ville:r.ville||"",tel:r.tel||"",email:r.email||""}}
function mapClub(r){return{id:r.id,nom:r.nom,ville:r.ville,animId:r.animateur_id,statut:r.statut,objectif:r.objectif??""}}
function mapLieu(r){return{id:r.id,nom:r.nom,ville:r.ville||"",adresse:r.adresse||"",lat:r.lat??"",lng:r.lng??"",capacite:r.capacite??"",contactNom:r.contact_nom||"",contactTel:r.contact_tel||"",notes:r.notes||"",photo:r.photo_url||""}}
function mapReunion(r){return{id:r.id,type:r.type,clubId:r.club_id,date:r.date,heure:r.heure||"",lieuId:r.lieu_id,animId:r.animateur_id,statut:r.statut,guests:[]}}
function mapGuest(r){return{_id:r.id,nom:r.nom,tel:r.tel||"",par:r.invite_par||"",statut:r.statut}}
function mapMembre(r){return{id:r.id,clubId:r.club_id,num:r.num,nom:r.nom,specialite:r.specialite||"",formulaire:!!r.formulaire,contrat:!!r.contrat,facture:!!r.facture,paiement:!!r.paiement,reorientation:r.reorientation||"",commentaires:r.commentaires||""}}
function rlsMsg(e){const m=(e&&e.message)||"";if(/row-level security|permission|policy|violates/i.test(m))return "Action non autorisée pour ton rôle.";return "Erreur : "+m}

/* ---- chargement : ce que RLS autorise pour l'utilisateur connecté ---- */
async function loadDB(){
  const [zc,ac,cc,lc,rc,ic,mc]=await Promise.all([
    sb.from("zones").select("*"),
    sb.from("animateurs").select("*"),
    sb.from("clubs").select("*"),
    sb.from("lieux").select("*"),
    sb.from("reunions").select("*"),
    sb.from("invites").select("*"),
    sb.from("membres").select("*")
  ]);
  const bad=[zc,ac,cc,lc,rc,ic,mc].find(x=>x.error);
  if(bad){console.error(bad.error);toast("Erreur de chargement des données")}
  DB={
    zones:(zc.data||[]).map(mapZone),
    animateurs:(ac.data||[]).map(mapAnim),
    clubs:(cc.data||[]).map(mapClub),
    lieux:(lc.data||[]).map(mapLieu),
    reunions:(rc.data||[]).map(mapReunion),
    membres:(mc.data||[]).map(mapMembre)
  };
  const byR={};DB.reunions.forEach(m=>byR[m.id]=m);
  (ic.data||[]).forEach(g=>{const m=byR[g.reunion_id];if(m)m.guests.push(mapGuest(g))});
}

/* ============================================================
   HELPERS
   ============================================================ */
const MOIS=["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const MOIS_LONG=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const JOURS=["dim.","lun.","mar.","mer.","jeu.","ven.","sam."];
const TODAY=new Date();TODAY.setHours(0,0,0,0);
function club(id){return DB.clubs.find(c=>c.id===id)||{}}
function anim(id){return DB.animateurs.find(a=>a.id===id)}
function animNom(id){const a=anim(id);return a?a.nom:"Non attribué"}
function lieu(id){return DB.lieux.find(l=>l.id===id)}
function lieuNom(id){const l=lieu(id);return l?l.nom:"À définir"}
function zone(id){return DB.zones.find(z=>z.id===id)}
function initiales(n){return(n||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()}
function dObj(iso){const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d)}
function isPast(iso){return dObj(iso)<TODAY}
function esc(s){return(s||"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1900)}

/* ---- périmètre selon rôle ---- */
function readOnly(){return SESSION.role==="visiteur"}
function national(){return true} // tout le monde voit tout le réseau ; le filtrage est local à chaque onglet
function scopedClubIds(){return DB.clubs.map(c=>c.id)}
function scopedVilles(){return null}
function isNationalEditor(){return SESSION.role==="superadmin"||SESSION.role==="directeur_national"}
function canEditReunion(m){
  if(isNationalEditor())return true;
  if(SESSION.role==="directeur")return zone(SESSION.zoneId).villes.includes(club(m.clubId).ville);
  return SESSION.clubIds.includes(m.clubId);
}
function canManageStructure(){return isNationalEditor()||SESSION.role==="directeur"} // clubs & animateurs
function canDeleteLieu(){return isNationalEditor()||SESSION.role==="directeur"}

/* ============================================================
   AUTH
   ============================================================ */
async function doLogin(){
  const u=document.getElementById("lg-user").value.trim().toLowerCase();
  const p=document.getElementById("lg-pass").value;const err=document.getElementById("lg-err");
  if(!u||!p){err.textContent="Identifiant et mot de passe requis.";return}
  err.textContent="Connexion…";
  const email=u.includes("@")?u:u+"@"+EMAIL_DOMAIN;
  const {error}=await sb.auth.signInWithPassword({email,password:p});
  if(error){err.textContent="Identifiant ou mot de passe incorrect.";return}
  err.textContent="";
  const ok=await bootIntoApp();
  if(ok)document.getElementById("lg-pass").value="";
}
async function loadSessionProfile(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user)return false;
  const {data:prof,error}=await sb.from("profiles").select("*").eq("id",user.id).single();
  if(error||!prof){console.error(error);toast("Profil introuvable");return false}
  SESSION={id:user.id,role:prof.role,name:prof.nom||user.email,zoneId:prof.zone_id,animId:prof.animateur_id,clubIds:[],_nat:false};
  return true;
}
async function bootIntoApp(){
  const ok=await loadSessionProfile();
  if(!ok){await sb.auth.signOut();return false}
  await loadDB();
  if(SESSION.role==="animateur"&&SESSION.animId)
    SESSION.clubIds=DB.clubs.filter(c=>c.animId===SESSION.animId).map(c=>c.id);
  enterApp();
  return true;
}
async function logout(){await sb.auth.signOut();SESSION=null;DB=null;
  document.getElementById("app").classList.add("hidden");document.getElementById("nav").classList.add("hidden");
  document.getElementById("fab").classList.add("hidden");document.getElementById("auth").classList.remove("hidden");window.scrollTo(0,0);}
function enterApp(){
  document.getElementById("auth").classList.add("hidden");document.getElementById("app").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");
  document.getElementById("tb-name").textContent=SESSION.name;
  const rp=document.getElementById("tb-role");rp.textContent=ROLES[SESSION.role];rp.className="role-pill"+(SESSION.role==="superadmin"?" sa":"");
  document.getElementById("admin-btn").classList.toggle("hidden",SESSION.role!=="superadmin");
  document.getElementById("pwd-btn").classList.toggle("hidden",SESSION.role==="visiteur");
  document.getElementById("ver-pill").textContent="v"+APP_VERSION;
  updateRegionLabel();go("dash");
}
function updateRegionLabel(){
  let t;
  if(SESSION.role==="visiteur")t="Consultation · tout le réseau";
  else if(SESSION.role==="directeur_national")t="Direction nationale · tout le réseau";

}

function zoneNomForVille(ville){
  const z=DB.zones.find(z=>(z.villes||[]).includes(ville));
  return z?z.nom:"Autres régions";
}
const VILLE_COLORS={"Rabat":"#B0122E","Salé":"#B8862A","Kenitra":"#2E7D5B","Casablanca":"#3A5DA8","Dar Bouazza":"#5AA0C8","Bouskoura":"#7A4DA8","Marrakech":"#C8A24C","Tanger":"#1FA0A0"};
function villeColor(v){return VILLE_COLORS[v]||"#8C8085"}
function clubHealth(c){
  const membres=DB.membres.filter(m=>m.clubId===c.id);
  const upcoming=DB.reunions.some(r=>r.clubId===c.id&&!isPast(r.date)&&r.statut!=="annulee");
  let score=0,max=0;
  max+=25; if(c.animId)score+=25;
  max+=25; if(upcoming)score+=25;
  max+=25; if(membres.length){const avg=membres.reduce((a,m)=>a+[m.formulaire,m.contrat,m.facture,m.paiement].filter(Boolean).length,0)/(membres.length*4);score+=Math.round(avg*25);}
  if(c.objectif){max+=25;score+=Math.round(Math.min(1,membres.length/c.objectif)*25);}
  const pct=max?Math.round(score/max*100):0;
  const level=pct>=70?"ok":pct>=40?"warn":"bad";
  return{pct,level,nbM:membres.length,upcoming};
}
function clubNextAction(c){
  const membres=DB.membres.filter(m=>m.clubId===c.id);
  if(!c.animId)return{label:"Nommer un animateur",act:`clubForm('${c.id}')`};
  if(!DB.reunions.some(r=>r.clubId===c.id&&!isPast(r.date)&&r.statut!=="annulee"))return{label:"Planifier une réunion",act:`meetingForm('','${c.id}')`};
  const relanceM=membres.find(m=>!m.formulaire||!m.contrat||!m.facture||!m.paiement);
  const relance=membres.filter(m=>!m.formulaire||!m.contrat||!m.facture||!m.paiement).length;
  if(relance)return{label:relance+" membre"+(relance>1?"s":"")+" à relancer",act:`memberSheet('${c.id}','${relanceM.id}')`};
  const aInt=DB.reunions.filter(r=>r.clubId===c.id).flatMap(r=>r.guests||[]).filter(g=>g.statut==="À intégrer").length;
  if(aInt)return{label:aInt+" invité"+(aInt>1?"s":"")+" à intégrer",act:`closeSheet();go('agenda')`};
  if(c.objectif&&membres.length<c.objectif)return{label:"Recruter "+(c.objectif-membres.length)+" membre(s)",act:`memberSheet('${c.id}')`};
  return{label:"Rien à signaler ✓",act:""};
}
function clubBadges(c){
  const b=[];
  if(!c.animId)b.push(`<span class="tag empty">Sans animateur</span>`);
  if(!DB.reunions.some(r=>r.clubId===c.id&&!isPast(r.date)&&r.statut!=="annulee"))b.push(`<span class="tag empty">Sans réunion</span>`);
  const relance=DB.membres.filter(m=>m.clubId===c.id&&(!m.formulaire||!m.contrat||!m.facture||!m.paiement)).length;
  if(relance)b.push(`<span class="tag" style="background:var(--warn-tint);color:var(--warn);border-color:transparent">${relance} à relancer</span>`);
  return b.join("");
}

    <div class="tile-foot">${a?`<span class="tag crim">${esc(a.nom)}</span>`:""}<span class="tag">${nbM} membre${nbM>1?"s":""}</span><span class="tag">${nbUp} à venir</span>${badges}</div></div>`;

function clubVilleChip(l,v){return `<button class="chip ${(window._clubVille||"")===v?"on":""}" onclick="window._clubVille='${v}';render()">${esc(l)}</button>`}

  const ids=scopedClubIds();

function dashStats(clubs){

    </div>
    <div style="font-size:12px;font-weight:600;color:var(--muted);margin:6px 2px 8px">Membres par groupe</div>
    <div class="rank">${ranks||`<div class="rank-row"><div class="rn" style="color:var(--muted);font-weight:500">Aucun club dans ce périmètre.</div></div>`}</div>`;
}
function dashFunnel(clubs){
  const ids=clubs.map(c=>c.id);
  const invites=DB.reunions.filter(r=>ids.includes(r.clubId)).flatMap(r=>r.guests||[]);
  if(!invites.length)return"";
  const cells=GUEST_STATUTS.map(s=>`<div class="stat"><div class="n">${invites.filter(g=>g.statut===s).length}</div><div class="l">${esc(s)}</div></div>`).join("");
  return `<div style="font-size:12px;font-weight:600;color:var(--muted);margin:16px 2px 8px">Entonnoir des invités</div>
    <div class="stats" style="grid-template-columns:repeat(5,1fr)">${cells}</div>`;
}
function dashByAnim(clubs){
  const ids=new Set(clubs.map(c=>c.id));
  const anims=DB.animateurs.filter(a=>DB.clubs.some(c=>c.animId===a.id&&ids.has(c.id)));
  if(!anims.length)return"";
  const rows=anims.map(a=>{
    const acl=DB.clubs.filter(c=>c.animId===a.id&&ids.has(c.id));
    const nbM=DB.membres.filter(m=>acl.some(c=>c.id===m.clubId)).length;
    const nbUp=DB.reunions.filter(r=>acl.some(c=>c.id===r.clubId)&&!isPast(r.date)&&r.statut!=="annulee").length;
    return{nom:a.nom,c:acl.length,m:nbM,r:nbUp};
  }).sort((x,y)=>y.m-x.m);
  const maxM=Math.max(1,...rows.map(r=>r.m));
  return `<div style="font-size:12px;font-weight:600;color:var(--muted);margin:16px 2px 8px">Par animateur</div>
    <div class="rank">${rows.map(r=>`<div class="rank-row"><div class="rn">${esc(r.nom)}<small>${r.c} club${r.c>1?"s":""} · ${r.r} réunion${r.r>1?"s":""} à venir</small></div>
      <div class="bar"><i style="width:${Math.round(r.m/maxM*100)}%"></i></div><div class="rv">${r.m}</div></div>`).join("")}</div>`;
}
function dashRelancer(clubs){
  const ids=new Set(clubs.map(c=>c.id));
  const flag=[["formulaire","Formulaire"],["contrat","Contrat"],["facture","Facture"],["paiement","Paiement"]];
  const list=DB.membres.filter(m=>ids.has(m.clubId)&&flag.some(f=>!m[f[0]]));
  if(!list.length)return `<div style="font-size:12px;font-weight:600;color:var(--muted);margin:16px 2px 8px">À relancer</div>
    <div class="rank"><div class="rank-row"><div class="rn" style="color:var(--ok);font-weight:600">✓ Tous les membres sont à jour.</div></div></div>`;
  const rows=list.sort((a,b)=>flag.filter(f=>!a[f[0]]).length-flag.filter(f=>!b[f[0]]).length===0?0:flag.filter(f=>!b[f[0]]).length-flag.filter(f=>!a[f[0]]).length).map(m=>{
    const manque=flag.filter(f=>!m[f[0]]).map(f=>f[1]).join(", ");
    return `<div class="rank-row" onclick="openClub('${m.clubId}')" style="cursor:pointer"><div class="rn">${esc(m.nom)}<small>${esc(club(m.clubId).nom.replace("CAP ",""))} · manque : ${esc(manque)}</small></div>
      <span class="gstat" style="background:var(--warn-tint);color:var(--warn);border-color:transparent">${4-flag.filter(f=>!m[f[0]]).length}/4</span></div>`;
  }).join("");
  return `<div style="font-size:12px;font-weight:600;color:var(--muted);margin:16px 2px 8px">À relancer <span style="color:var(--warn);font-weight:700">${list.length}</span></div>
    <div class="rank">${rows}</div>`;
}
function viewDashboard(){
  const seeAll=true; // tout le monde voit le national + régional ; filtrage local par onglet
  const scope=DB.clubs;
  let html=`<div class="page"><div class="page-head"><div><div class="eyebrow">Pilotage</div><h2>Synthèse</h2></div>
    <button class="btn ghost mini" onclick="exportMembres()">Export membres</button></div>`;
  if(seeAll){
    html+=`<div class="dash-band">National · tout le réseau</div>`+dashBlock(dashStats(DB.clubs));
    const reg=DB.clubs.filter(c=>REGION_RSK.includes(c.ville));
    html+=`<div class="dash-band reg">Régional · Rabat · Salé · Kénitra</div>`+dashBlock(dashStats(reg));
  }else{
    html+=`<div class="dash-band">Mon périmètre</div>`+dashBlock(dashStats(scope));
  }
  html+=dashFunnel(scope)+dashByAnim(scope)+dashRelancer(scope);
  return html+`<div style="height:8px"></div></div>`;
}

async function saveMeeting(id){
  const g=x=>document.getElementById(x).value;
  const clubId=g("f-club"),date=g("f-date");if(!clubId||!date){toast("Club et date obligatoires");return}
  const row={type:g("f-type"),club_id:clubId,date,heure:g("f-heure")||null,lieu_id:g("f-lieu")||null,animateur_id:g("f-anim")||null,statut:g("f-statut")};
  if(id){
    const {error}=await sb.from("reunions").update(row).eq("id",id);
    if(error){toast(rlsMsg(error));return}
    const m=DB.reunions.find(x=>x.id===id);
    Object.assign(m,{type:row.type,clubId:row.club_id,date:row.date,heure:row.heure||"",lieuId:row.lieu_id,animId:row.animateur_id,statut:row.statut});
    toast("Réunion mise à jour");
  }else{
    const {data,error}=await sb.from("reunions").insert(row).select().single();
    if(error){toast(rlsMsg(error));return}
    DB.reunions.push(mapReunion(data));toast("Réunion créée");
  }
  closeSheet();render();
}
async function delMeeting(id){
  const {error}=await sb.from("reunions").delete().eq("id",id);
  if(error){toast(rlsMsg(error));return}
  DB.reunions=DB.reunions.filter(x=>x.id!==id);closeSheet();render();toast("Réunion supprimée");
}
async function setReunionStatut(id,s){
  const {error}=await sb.from("reunions").update({statut:s}).eq("id",id);
  if(error){toast(rlsMsg(error));return}
  DB.reunions.find(x=>x.id===id).statut=s;render();toast("Statut : "+STATUTS[s]);
}

async function convertGuest(mid,i){
  const m=DB.reunions.find(x=>x.id===mid);const g=m.guests[i];
  const already=DB.membres.some(x=>x.clubId===m.clubId&&x.nom.toLowerCase()===g.nom.toLowerCase());
  if(already){toast(g.nom+" est déjà membre de ce club");return}
  const nextNum=(DB.membres.filter(x=>x.clubId===m.clubId).reduce((a,b)=>Math.max(a,b.num||0),0))+1;
  const {data,error}=await sb.from("membres").insert({club_id:m.clubId,num:nextNum,nom:g.nom,commentaires:"Ancien invité"+(g.par?" (invité par "+g.par+")":"")}).select().single();
  if(error){toast(rlsMsg(error));return}
  DB.membres.push(mapMembre(data));
  await sb.from("invites").update({statut:"Membre"}).eq("id",g._id);g.statut="Membre";
  toast(g.nom+" ajouté aux membres du club");meetingDetail(m,true);
}

function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const img=new Image();const rd=new FileReader();
  rd.onload=()=>{img.onload=()=>{
    const max=1000;let{width:w,height:h}=img;if(w>max||h>max){if(w>h){h=h*max/w;w=max}else{w=w*max/h;h=max}}
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
    _photoBuffer=cv.toDataURL("image/jpeg",0.72);
    const p=document.getElementById("l-photo-prev");p.src=_photoBuffer;p.classList.remove("hidden");
  };img.src=rd.result;};rd.readAsDataURL(file);
}
async function saveLieu(id){
  const g=x=>document.getElementById(x).value;const nom=g("l-nom").trim();if(!nom){toast("Nom requis");return}
  const existing=id?lieu(id):null;
  const row={nom,ville:g("l-ville"),adresse:g("l-adresse").trim(),lat:parseFloat(g("l-lat"))||null,lng:parseFloat(g("l-lng"))||null,
    capacite:parseInt(g("l-cap"))||null,contact_nom:g("l-cnom").trim(),contact_tel:g("l-ctel").trim(),notes:g("l-notes").trim(),
    photo_url:_photoBuffer!==null?_photoBuffer:(existing?existing.photo:"")};
  if(id){
    const {error}=await sb.from("lieux").update(row).eq("id",id);
    if(error){toast(rlsMsg(error));return}
    Object.assign(existing,mapLieu({id,...row}));toast("Lieu mis à jour");
  }else{
    const {data,error}=await sb.from("lieux").insert(row).select().single();
    if(error){toast(rlsMsg(error));return}
    DB.lieux.push(mapLieu(data));toast("Lieu créé");
  }

async function saveMembre(clubId,id){
  const nom=document.getElementById("m-nom").value.trim();if(!nom){toast("Nom requis");return}
  const chk=k=>document.getElementById("m-"+k).checked;
  const spec=document.getElementById("m-specialite").value.trim();
  const dupSpec=spec&&DB.membres.some(m=>m.clubId===clubId&&m.id!==id&&(m.specialite||"").toLowerCase()===spec.toLowerCase());
  const row={club_id:clubId,nom,specialite:document.getElementById("m-specialite").value.trim(),
    formulaire:chk("formulaire"),contrat:chk("contrat"),facture:chk("facture"),paiement:chk("paiement"),
    reorientation:document.getElementById("m-reorientation").value.trim(),commentaires:document.getElementById("m-commentaires").value.trim()};
  if(id){
    const {error}=await sb.from("membres").update(row).eq("id",id);
    if(error){toast(rlsMsg(error));return}
    Object.assign(DB.membres.find(x=>x.id===id),mapMembre({id,...row}));toast("Membre mis à jour");
  }else{
    const nextNum=(DB.membres.filter(x=>x.clubId===clubId).reduce((a,b)=>Math.max(a,b.num||0),0))+1;
    const {data,error}=await sb.from("membres").insert({...row,num:nextNum}).select().single();
    if(error){toast(rlsMsg(error));return}
    DB.membres.push(mapMembre(data));toast("Membre ajouté");
  }
  openClub(clubId);
  if(dupSpec)setTimeout(()=>toast("⚠️ Spécialité « "+spec+" » déjà présente dans ce club"),1400);
}

  DB.membres=DB.membres.filter(x=>x.id!==id);openClub(clubId);toast("Membre retiré");

    <div class="field"><label>Identifiant (prénom)</label><input id="ac-login" placeholder="prenom" autocapitalize="none"></div>
    <div class="field"><label>Nom affiché</label><input id="ac-nom" placeholder="Prénom Nom"></div>
    <div class="field"><label>Mot de passe</label><input id="ac-pwd" type="text" placeholder="Mot de passe"></div>
    <div class="field"><label>Rôle</label><select id="ac-role" onchange="acExtraFields()">${acRoleOptions("animateur")}</select></div>
    <div id="ac-extra"></div>
    <div class="sheet-actions"><button class="btn ghost" onclick="openAccounts()">Annuler</button><button class="btn" onclick="acCreate()">Créer le compte</button></div>`;
  acExtraFields();
}
function accountEdit(id){
  const u=_accounts.find(x=>x.id===id);if(!u)return;_editingAccount=u;
  document.getElementById("sheet-content").innerHTML=`
    <h3>${esc(u.login||u.email)}</h3><div class="sheet-sub">${esc(u.nom||"—")} · ${ROLES[u.role]||u.role||"sans profil"}</div>
    <div class="field"><label>Réinitialiser le mot de passe</label><input id="ac-pwd" type="text" placeholder="Nouveau mot de passe"></div>
    <button class="btn" onclick="acSetPassword('${id}')">Réinitialiser</button>
    <div class="divider"></div>
    <div class="field"><label>Rôle</label><select id="ac-role" onchange="acExtraFields()">${acRoleOptions(u.role)}</select></div>
    <div id="ac-extra"></div>
    <button class="btn ghost" onclick="acSetRole('${id}')">Enregistrer le rôle</button>
    <div class="del-link" onclick="acDelete('${id}')">Supprimer ce compte</div>
    <div class="sheet-actions"><button class="btn ghost" onclick="openAccounts()">Retour</button></div>`;
  acExtraFields();
}
function acFields(){const z=document.getElementById("ac-zone"),a=document.getElementById("ac-anim");return{zone_id:z?z.value||null:null,animateur_id:a?a.value||null:null}}
async function acCreate(){
  const login=document.getElementById("ac-login").value.trim().toLowerCase();
  const nom=document.getElementById("ac-nom").value.trim();
  const password=document.getElementById("ac-pwd").value;
  const role=document.getElementById("ac-role").value;
  if(!login||!password){toast("Identifiant et mot de passe requis");return}
  const {error}=await adminCall({action:"create",login,nom,password,role,...acFields()});
  if(error){toast(error);return}
  toast("Compte créé");openAccounts();
}
async function acSetPassword(id){
  const pwd=document.getElementById("ac-pwd").value;if(!pwd){toast("Saisis un mot de passe");return}
  const {error}=await adminCall({action:"set_password",id,password:pwd});
  if(error){toast(error);return}
  toast("Mot de passe réinitialisé");document.getElementById("ac-pwd").value="";
}
async function acSetRole(id){
  const role=document.getElementById("ac-role").value;
  const {error}=await adminCall({action:"set_role",id,role,...acFields()});
  if(error){toast(error);return}
  toast("Rôle mis à jour");openAccounts();
}
async function acDelete(id){
  const {error}=await adminCall({action:"delete",id});
  if(error){toast(error);return}
  toast("Compte supprimé");openAccounts();
}

/* ============================================================
   VERSION — notes de mise à jour + alerte nouvelle version
   ============================================================ */
function openChangelog(){
  const body=CHANGELOG.map(rel=>{
    const grp=(cls,title,arr)=>arr&&arr.length?`<div class="cl-grp ${cls}"><div class="h">${title}</div><ul>${arr.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`:"";
    return `<div class="cl-ver"><b>v${rel.v}</b><span>${esc(rel.date)}</span></div>
      ${grp("add","Ajouté",rel.notes["Ajouté"])}${grp("mod","Modifié",rel.notes["Modifié"])}${grp("fix","Corrigé",rel.notes["Corrigé"])}`;
  }).join(`<div class="divider"></div>`);
  document.getElementById("sheet-content").innerHTML=`
    <h3>Notes de mise à jour</h3><div class="sheet-sub">Version actuelle : v${APP_VERSION}</div>
    ${body}
    <div class="sheet-actions"><button class="btn" onclick="closeSheet()">Fermer</button></div>`;
  openSheet();
}
let _updateSeen=null;
function cmpVer(a,b){const pa=a.split(".").map(Number),pb=b.split(".").map(Number);for(let i=0;i<3;i++){if((pa[i]||0)>(pb[i]||0))return 1;if((pa[i]||0)<(pb[i]||0))return -1}return 0}
async function checkUpdate(){
  try{
    const r=await fetch("/version.json?_="+Date.now(),{cache:"no-store"});
    if(!r.ok)return;const v=await r.json();
    if(v&&v.version&&cmpVer(v.version,APP_VERSION)>0&&v.version!==_updateSeen){_updateSeen=v.version;showUpdateBar(v.version)}
  }catch(e){}
}
function showUpdateBar(v){
  if(document.getElementById("update-bar"))return;
  const bar=document.createElement("div");bar.id="update-bar";bar.className="update-bar";
  bar.innerHTML=`<div class="ub-t">Nouvelle version <b>v${esc(v)}</b> disponible</div>
    <button onclick="location.reload(true)">Mettre à jour</button>
    <button onclick="this.parentElement.remove()" style="background:transparent;color:#fff;padding:9px 6px">✕</button>`;
  document.body.appendChild(bar);
}

const VILLES=["Rabat","Salé","Kenitra","Casablanca","Dar Bouazza","Bouskoura","Marrakech"];
function openSheet(){document.getElementById("sheet").classList.add("open")}
function closeSheet(){document.getElementById("sheet").classList.remove("open");_photoBuffer=null}

(async function(){
  document.getElementById("lg-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
  document.getElementById("lg-user").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("lg-pass").focus()});
  const {data:{session}}=await sb.auth.getSession();
  if(session)await bootIntoApp();
  checkUpdate();setInterval(checkUpdate,180000);
})();
</script>
